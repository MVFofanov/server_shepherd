[agent]
server_id = "cluster-node-01"
interval_minutes = 30
output_path = "./data/metrics.jsonl"
disk_path = "/"
cpu_sample_seconds = 1.0

[privacy]
message_mode = "middle"

[telegram]
enabled = false
chat_id = "123456789"
bot_token_env = "SERVER_SHEPHERD_TELEGRAM_BOT_TOKEN"

[website]
url = "https://google.com/"
expected_status = 200
timeout_seconds = 5.0

[thresholds.cpu_percent]
warning = 70.0
critical = 90.0

[thresholds.memory_percent]
warning = 75.0
critical = 90.0

[thresholds.disk_percent]
warning = 80.0
critical = 90.0
